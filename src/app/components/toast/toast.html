@if (isVisible) {
  <div class="toast" (click)="dismissed.emit()" role="status" aria-live="polite">
    <div class="toast__icon-wrap">
      <mat-icon>check_circle</mat-icon>
    </div>
    <span class="toast__text">{{ message }}</span>
    <button class="toast__dismiss" aria-label="Cerrar notificación">
      <mat-icon>close</mat-icon>
    </button>
  </div>
}
